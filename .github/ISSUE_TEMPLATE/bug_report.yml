name: Bug Report
description: Report a defect with clear repro steps and expected behavior
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail for reproducibility.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Short description of the issue
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps To Reproduce
      description: Provide numbered steps
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Run ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What happens instead?
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true

  - type: checkboxes
    id: area
    attributes:
      label: Affected Area
      options:
        - label: Backend API
        - label: Frontend UI
        - label: Opportunity Radar
        - label: CI / Tooling

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste stack trace, terminal output, or API response
      render: shell

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, browser (if UI)
      placeholder: Ubuntu 24.04, Node 20, Chrome 124
