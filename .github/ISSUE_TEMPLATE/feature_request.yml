name: Feature Request
description: Propose an enhancement with clear value and acceptance criteria
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Please describe the user value and expected outcome.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What user pain or limitation does this solve?
      placeholder: As a user, I cannot ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: What should be built?
      placeholder: Build a new ...
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Mention likely impacted areas
      placeholder: Backend route, frontend page, tests, docs

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      placeholder: Other options evaluated

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Define done conditions
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
    validations:
      required: true
